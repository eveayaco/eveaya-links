<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ════════════════════════════════════════════════════════════════
     STEP 1 — EDIT THESE 5 LINES FOR EACH PRODUCT, THEN SAVE THE FILE
     This is what Facebook reads when you paste this page's link.
     ════════════════════════════════════════════════════════════════ -->
<title>Summer Women Strap Tops Fashion Korean Style — Eveaya Co</title>
<meta property="og:title" content="Summer Women Strap Tops Fashion Korean Style">
<meta property="og:description" content="₱336 – ₱520 · Shop now at Eveaya Co">
<meta property="og:image" content="https://yourusername.github.io/eveaya-links/your-photo-filename.jpg">
<meta property="og:url" content="https://yourusername.github.io/eveaya-links/eveaya-shopee-redirect-template.html">
<meta property="og:type" content="website">
<!-- ════════════════════════════════════════════════════════════════ -->

<style>
  :root {
    --bg: #F2F5EE;
    --card: #FFFFFF;
    --ink: #2E2A28;
    --ink-soft: #6B655F;
    --rose: #C97B86;
    --sage: #7E8F6E;
    --rose-light: #F3DEE1;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--ink);
    padding: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 24px;
    max-width: 380px;
    width: 100%;
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 20px 60px -20px rgba(46, 42, 40, 0.15);
  }

  .brand {
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--sage);
    letter-spacing: 0.02em;
    margin: 0 0 24px;
  }

  .brand::before { content: "✿ "; }

  /* ──────────────────────────────────────────────
     STEP 2 — EDIT THE PRODUCT PHOTO, TITLE & PRICE
     (keep this matching what you put in og:image/og:title above)
     ────────────────────────────────────────────── */
  .product-photo {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 16px;
    margin-bottom: 20px;
    background: var(--rose-light);
  }

  .product-title {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    margin: 0 0 6px;
  }

  .product-price {
    font-size: 18px;
    font-weight: 700;
    color: var(--rose);
    margin: 0 0 24px;
  }
  /* ────────────────────────────────────────────── */

  .status {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 12px;
  }

  .progress-track {
    height: 6px;
    background: var(--rose-light);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--sage);
    border-radius: 99px;
    animation: fill 1.4s ease-out forwards;
  }

  @keyframes fill {
    to { width: 100%; }
  }

  .continue-btn {
    display: inline-block;
    width: 100%;
    padding: 13px 0;
    background: var(--sage);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    border-radius: 12px;
    transition: opacity 0.2s;
  }

  .continue-btn:active { opacity: 0.8; }

  @media (prefers-reduced-motion: reduce) {
    .progress-fill { animation: none; width: 100%; }
  }
</style>

<!-- Auto-redirect after 1.5 seconds (also edit the URL in the <script> below) -->
<meta http-equiv="refresh" content="1.5; url=https://s.shopee.ph/5VTJirvh0J">
</head>

<body>

  <div class="card">
    <p class="brand">Eveaya Co</p>

    <!-- STEP 2 (continued) — same edits as above -->
    <img class="product-photo"
         src="https://yourusername.github.io/eveaya-links/your-photo-filename.jpg"
         alt="Summer Women Strap Tops Fashion Korean Style">

    <p class="product-title">Summer Women Strap Tops Fashion Korean Style</p>
    <p class="product-price">₱336 – ₱520</p>

    <p class="status">Taking you to Shopee…</p>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <!-- STEP 3 — paste your Shopee link here too (must match the one above) -->
    <a class="continue-btn" href="https://s.shopee.ph/5VTJirvh0J">
      Continue to Shopee now
    </a>
  </div>

  <script>
    // Fallback redirect in case the meta-refresh tag doesn't fire
    setTimeout(function () {
      window.location.href = "https://s.shopee.ph/5VTJirvh0J";
    }, 1500);
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</body>
</html>
